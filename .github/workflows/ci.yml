name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  vscode-preview-verify:
    name: VS Code preview verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/vscode-preview
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/vscode-preview/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
